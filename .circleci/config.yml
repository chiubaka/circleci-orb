version: 2.1
setup: true

# Compute whether this push is release-related, then continue to continue_config.yml.
# Enable "Dynamic config using setup workflows" in CircleCI project settings.
# https://circleci.com/docs/guides/orchestrate-auth-workflows-with-dynamic-config/

orbs:
  continuation: circleci/continuation@2.0.1
  jq: circleci/jq@3.0.2

jobs:
  setup-publish-parameters:
    docker:
      - image: cimg/base:stable
    resource_class: small
    steps:
      - checkout
      - jq/install
      - run:
          name: Set run-changesets-publish from diff
          environment:
            BASE_REVISION: master
            SAME_BASE_RUN: "true"
          # Bootstrap note: this orb repo cannot consume its own new command here
          # before publish; keep setup using the source script in-repo.
          command: bash src/scripts/computeChangesetsPublishParameters.sh
      - continuation/continue:
          configuration_path: .circleci/continue_config.yml
          parameters: /tmp/pipeline-parameters.json

workflows:
  setup:
    jobs:
      - setup-publish-parameters
