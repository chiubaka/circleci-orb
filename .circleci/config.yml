version: 2.1
setup: true

# Merge inline chiubaka orb + continue_config.yml, validate, then continue (see mergeContinueWithInlineOrb.py).
# Enable "Dynamic config using setup workflows" in CircleCI project settings.
# https://circleci.com/docs/guides/orchestrate-auth-workflows-with-dynamic-config/

orbs:
  continuation: circleci/continuation@2.0.1

jobs:
  setup-merge-continue:
    docker:
      - image: cimg/python:3.12
    resource_class: small
    steps:
      - checkout
      - run:
          name: Install CircleCI CLI
          command: curl -fLSs https://raw.githubusercontent.com/CircleCI-Public/circleci-cli/main/install.sh | sudo bash
      - run:
          name: Install ruamel.yaml (merge inline orb into continuation config)
          command: pip install --user 'ruamel.yaml>=0.18.0'
      - run:
          name: Merge inline chiubaka orb into continuation config
          command: |
            export PATH="$HOME/.local/bin:$PATH"
            python3 src/scripts/mergeContinueWithInlineOrb.py
      - run:
          name: Validate merged continuation config
          command: circleci config validate .circleci/continue_merged.yml
      - continuation/continue:
          configuration_path: .circleci/continue_merged.yml

workflows:
  setup:
    jobs:
      - setup-merge-continue
