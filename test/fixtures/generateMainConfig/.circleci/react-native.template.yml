version: 2.1

# React Native CI template
orbs:
  chiubaka: chiubaka/circleci-orb@<<pipeline.parameters.dev-orb-version>>

parameters:
  ios-semver-regex:
    type: string
    default: "${IOS_SEMVER_REGEX}"
  android-semver-regex:
    type: string
    default: "${ANDROID_SEMVER_REGEX}"

workflows:
  ci:
    jobs:
      - chiubaka/react-native-ci:
          setup-ios-apps-steps: >
            ${SETUP_IOS_APPS_STEPS}
          setup-android-apps-steps: >
            ${SETUP_ANDROID_APPS_STEPS}
