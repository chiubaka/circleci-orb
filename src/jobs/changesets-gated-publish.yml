description: >
  After a squash-merged release PR, run assert-release-merge then the same publish path as
  job publish (registry auth, optional build, pnpm exec changeset publish). By default, when
  create-github-release is true, also creates a GitHub Release and UTC train git tag (ADR 0037).
  Pair with a path-filtering + continuation workflow on the client so this job only runs for relevant merges.

executor:
  name: docker-node
  resource-class: << parameters.resource-class >>

parameters:
  app-dir:
    type: string
    default: "."
    description: Path to the directory containing package.json.
  attach-workspace:
    type: boolean
    default: false
    description: When true, attach a persisted workspace before install.
  workspace-at:
    type: string
    default: "."
    description: attach_workspace path when attach-workspace is true.
  build-script:
    type: string
    default: "build:ci"
    description: package.json script for the build step (skipped when skip-build is true).
  checkout:
    type: boolean
    default: true
    description: Whether setup performs checkout first.
  cleanup-steps:
    type: steps
    default: []
    description: Steps to run after publish.
  configure-git-user:
    type: boolean
    default: true
    description: Configure global git user (often required for Changesets tagging).
  dry-run:
    type: boolean
    default: false
    description: Passes through to the publish command.
  git-user-email:
    type: string
    default: circleci@chiubaka.com
    description: Git user email when configure-git-user is true.
  git-user-name:
    type: string
    default: CircleCI
    description: Git user name when configure-git-user is true.
  init-submodules:
    type: boolean
    default: false
    description: Whether to initialize git submodules during setup.
  npmrc-path:
    type: string
    default: ""
    description: Passed to setup-npm-registry-auth when non-empty.
  owner:
    type: string
    default: chiubaka
    description: GitHub Packages scope owner when registry-backend is github-packages.
  pre-publish-steps:
    type: steps
    default: []
    description: Steps after assert/build and before publish.
  primary-branch:
    type: string
    default: "master"
    description: Primary branch name for setup.
  publish-script:
    type: string
    default: ""
    description: If non-empty, pnpm run this script for publish; else pnpm exec changeset publish.
  registry-access:
    type: enum
    enum:
      - read
      - publish
    default: publish
    description: Passed to setup-npm-registry-auth.
  registry-backend:
    type: enum
    enum:
      - npmjs
      - github-packages
    default: github-packages
    description: npmjs or GitHub Packages (ADR 0034).
  release-merge-subject-regex:
    type: string
    default: "^chore\\(release\\): version packages"
    description: ERE for assert-release-merge (latest commit subject).
  resource-class:
    default: medium
    description: Resource class for docker-node.
    enum:
      - small
      - medium
      - medium+
      - large
      - xlarge
      - 2xlarge
      - 2xlarge+
    type: enum
  setup-steps:
    type: steps
    default: []
    description: Extra steps after setup and before git user configuration.
  skip-build:
    type: boolean
    default: false
    description: Skip the build step when artifacts already exist.
  skip-install:
    type: boolean
    default: false
    description: Skip pnpm install during setup.
  always-auth:
    type: boolean
    default: true
    description: Passed to setup-npm-registry-auth.
  verify-changeset-deletions:
    type: boolean
    default: false
    description: When true, assert HEAD deletes at least one path under .changeset/.
  create-github-release:
    type: boolean
    default: true
    description: >
      When true, after publish runs install-github-cli and github-release-train (GitHub Release + train
      tag). Requires GITHUB_TOKEN with contents:write. Set false for repos that opt out of GitHub Releases.
  train-tag-prefix:
    type: string
    default: "release/"
    description: Passed to github-release-train (git tag prefix before UTC logical id YYYY.MM.DD.N).
  release-train-draft:
    type: boolean
    default: false
    description: Passed to github-release-train (--draft).
  release-train-prerelease:
    type: boolean
    default: false
    description: Passed to github-release-train (--prerelease).
  release-train-title-template:
    type: string
    default: "{{logical_train_id}}"
    description: Passed to github-release-train (GitHub release title template).
  release-train-on-existing-tag:
    type: enum
    enum:
      - skip
      - fail
    default: skip
    description: Passed to github-release-train idempotency behavior when the train tag already exists.

steps:
  - setup:
      app-dir: << parameters.app-dir >>
      attach-workspace: << parameters.attach-workspace >>
      checkout: << parameters.checkout >>
      init-submodules: << parameters.init-submodules >>
      pre-install-steps:
        - setup-npm-registry-auth:
            always-auth: << parameters.always-auth >>
            npmrc-path: << parameters.npmrc-path >>
            owner: << parameters.owner >>
            registry-access: << parameters.registry-access >>
            registry-backend: << parameters.registry-backend >>
      primary-branch: << parameters.primary-branch >>
      skip-pnpm-install: << parameters.skip-install >>
      workspace-at: << parameters.workspace-at >>
  - steps: << parameters.setup-steps >>
  - when:
      condition: << parameters.configure-git-user >>
      steps:
        - run:
            name: Configure git user
            working_directory: << parameters.app-dir >>
            command: git config --global user.name << parameters.git-user-name >> && git config --global user.email << parameters.git-user-email >>
  - assert-release-merge:
      app-dir: << parameters.app-dir >>
      release-merge-subject-regex: << parameters.release-merge-subject-regex >>
      verify-changeset-deletions: << parameters.verify-changeset-deletions >>
  - when:
      condition:
        not: << parameters.skip-build >>
      steps:
        - run:
            name: Build before publish
            working_directory: << parameters.app-dir >>
            command: pnpm run << parameters.build-script >>
  - steps: << parameters.pre-publish-steps >>
  - publish:
      app-dir: << parameters.app-dir >>
      dry-run: << parameters.dry-run >>
      publish-script: << parameters.publish-script >>
  - when:
      condition: << parameters.create-github-release >>
      steps:
        - install-github-cli
        - github-release-train:
            app-dir: << parameters.app-dir >>
            train-tag-prefix: << parameters.train-tag-prefix >>
            draft: << parameters.release-train-draft >>
            prerelease: << parameters.release-train-prerelease >>
            title-template: << parameters.release-train-title-template >>
            on-existing-tag: << parameters.release-train-on-existing-tag >>
  - steps: << parameters.cleanup-steps >>
