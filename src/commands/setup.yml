description: >
  This command sets up the CI environment for the repository

parameters:
  checkout:
    description: Whether or not to checkout as the first step of this command
    type: boolean
    default: true
  init-submodules:
    type: boolean
    default: false
    description: Whether or not to initialize submodules included in this repository.
  app-dir:
    type: string
    default: "."
    description: Path to the directory containing your package.json file. Not needed if package.json lives in the root.
  primary-branch:
    type: string
    default: "master"
    description: The name of the primary branch.
  skip-pnpm-install:
    type: boolean
    default: false
    description: >
      When true, skip node/install-packages. Use when dependencies are restored from a workspace
      or another cache strategy upstream.
  attach-workspace:
    type: boolean
    default: false
    description: >
      When true, attach a persisted workspace before installing dependencies (after checkout and SCM setup).
  workspace-at:
    type: string
    default: "."
    description: Path passed to attach_workspace when attach-workspace is true.
  pre-install-steps:
    type: steps
    default: []
    description: >
      Steps after checkout/SCM setup and optional workspace attach, before pnpm install.
      Use for registry authentication (setup-npm-registry-auth) when installing private packages.

steps:
  - when:
      condition: << parameters.checkout >>
      steps:
        - checkout
  - run:
      name: Set default git branch
      command: << include(scripts/setDefaultGitBranch.sh) >>
      environment:
        PRIMARY_BRANCH: << parameters.primary-branch >>
  - when:
      condition: << parameters.init-submodules >>
      steps:
        - run:
            name: Initialize submodules
            command: git submodule update --init --recursive
  - run:
      name: Set Turbo SCM base for affected detection
      command: << include(scripts/setTurboScmBase.sh) >>
      environment:
        PRIMARY_BRANCH: << parameters.primary-branch >>
  - when:
      condition: << parameters.attach-workspace >>
      steps:
        - attach_workspace:
            at: << parameters.workspace-at >>
  - steps: << parameters.pre-install-steps >>
  - when:
      condition:
        not: << parameters.skip-pnpm-install >>
      steps:
        - node/install-packages:
            check-cache: always
            pkg-manager: pnpm
            with-cache: true
            app-dir: << parameters.app-dir >>
