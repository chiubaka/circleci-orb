description: >
  Validate pin-only .releases/<cycle-id>/ release cycle trees (ADR 0041, ADR 0042). By default
  validates only cycle directories touched in the working tree; set mode=all to validate every cycle
  under .releases/. Fails fast with actionable errors on schema violations.

parameters:
  app-dir:
    type: string
    default: "."
    description: Monorepo root containing .releases/.
  mode:
    type: enum
    enum:
      - changed
      - all
    default: changed
    description: changed validates only touched cycles; all validates every .releases/<cycle-id>/.

steps:
  - run:
      name: Stage release cycle scripts
      working_directory: << parameters.app-dir >>
      command: << include(scripts/stageReleaseCycleWriter.sh) >>
  - run:
      name: Verify release cycle manifests
      working_directory: << parameters.app-dir >>
      command: << include(scripts/runVerifyReleaseManifest.sh) >>
      environment:
        APP_DIR: .
        VERIFY_RELEASE_MANIFEST_MODE: << parameters.mode >>
        VALIDATE_RELEASE_CYCLE_SCRIPT: /tmp/chiubaka-release-cycle/validateReleaseCycle.mjs
        VALIDATE_RELEASE_MANIFEST_SCRIPT: /tmp/chiubaka-release-cycle/validateReleaseManifest.mjs
