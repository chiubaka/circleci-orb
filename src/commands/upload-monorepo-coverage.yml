description: >
  This command uploads coverage reports for monorepos to Codecov

parameters:
  app-dir:
    type: string
    default: "."
    description: Path to the directory containing your package.json file. Not needed if package.json lives in the root.
  monorepo-root:
    type: string
    default: "."
    description: >
      Directory containing the pnpm workspace root (where `pnpm ls -r` should run).
      Use when app-dir points at a nested package but the workspace lives at the repo root.
  coverage-dir:
    type: string
    default: reports/coverage
    description: Path relative to app-dir where coverage reports can be found
  codecov-cli-version:
    type: string
    default: latest
    description: Version of the Codecov uploader/CLI binary to use
  fail-on-error:
    type: boolean
    default: false
    description: Exit non-zero when an upload fails.
  verbose:
    type: boolean
    default: false
    description: Enable verbose Codecov logs.
  disable-search:
    type: boolean
    default: false
    description: Disable automatic coverage file search for each package upload.
  files:
    type: string
    default: ""
    description: Comma-separated list of explicit files to upload per package.

steps:
  - run:
      name: Prepare Codecov uploader for monorepo uploads
      command: << include(scripts/setupCodecovLegacyUploader.sh) >>
      environment:
        VERSION: << parameters.codecov-cli-version >>
        RUN_VALIDATE: true
  - run:
      name: Upload Monorepo Coverage Results
      working_directory: << parameters.monorepo-root >>
      command: << include(scripts/uploadMonorepoCoverageResults.sh) >>
      environment:
        MONOREPO_ROOT: << parameters.monorepo-root >>
        COVERAGE_DIR: << parameters.app-dir >>/<< parameters.coverage-dir >>
        CODECOV_FAIL_ON_ERROR: << parameters.fail-on-error >>
        CODECOV_VERBOSE: << parameters.verbose >>
        CODECOV_DISABLE_SEARCH: << parameters.disable-search >>
        CODECOV_FILES: << parameters.files >>
