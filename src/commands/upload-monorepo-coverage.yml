description: >
  This command uploads coverage reports for monorepos to Codecov

parameters:
  app-dir:
    type: string
    default: "."
    description: Path to the directory containing your package.json file. Not needed if package.json lives in the root.
  monorepo-root:
    type: string
    default: "."
    description: >
      Directory containing the pnpm workspace root (where `pnpm ls -r` should run).
      Use when app-dir points at a nested package but the workspace lives at the repo root.
  coverage-dir:
    type: string
    default: reports/coverage
    description: Path relative to app-dir where coverage reports can be found
  codecov-cli-version:
    type: string
    default: latest
    description: Version of the Codecov CLI used by codecov/upload
  fail-on-error:
    type: boolean
    default: false
    description: Exit non-zero when an upload fails.
  verbose:
    type: boolean
    default: false
    description: Enable verbose Codecov logs.
  disable-search:
    type: boolean
    default: false
    description: Disable automatic coverage file search for each package upload.
  files:
    type: string
    default: ""
    description: Comma-separated list of explicit files to upload.
  flags:
    type: string
    default: ""
    description: Comma-separated list of Codecov flags for this upload.

steps:
  - codecov/upload:
      version: << parameters.codecov-cli-version >>
      dir: << parameters.app-dir >>/<< parameters.coverage-dir >>
      fail_on_error: << parameters.fail-on-error >>
      verbose: << parameters.verbose >>
      disable_search: << parameters.disable-search >>
      files: << parameters.files >>
      flags: << parameters.flags >>
      network_root_folder: << parameters.monorepo-root >>
