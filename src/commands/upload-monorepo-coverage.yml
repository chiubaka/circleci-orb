description: >
  Uploads Codecov coverage for each pnpm workspace package that has a matching directory under
  the coverage path (for example reports/coverage/<packagePath>). The workspace root package
  is skipped: there is no separate upload for the entire tree under the coverage root, so the
  root `package.json` name is not used as a Codecov flag. Leaf packages under the workspace
  continue to receive one upload each when their per-package coverage directory exists. Package
  names are normalized to Codecov-safe flags (for example `@chiubaka/lint` becomes
  `lint`) before upload.

parameters:
  app-dir:
    type: string
    default: "."
    description: Path to the directory containing your package.json file. Not needed if package.json lives in the root.
  monorepo-root:
    type: string
    default: "."
    description: >
      Directory containing the pnpm workspace root (where `pnpm ls -r` should run).
      Use when app-dir points at a nested package but the workspace lives at the repo root.
  coverage-dir:
    type: string
    default: reports/coverage
    description: Path relative to app-dir where coverage reports can be found
  fail-on-error:
    type: boolean
    default: false
    description: Exit non-zero when an upload fails.
  verbose:
    type: boolean
    default: true
    description: Enable verbose Codecov logs by default.
  require-uploads:
    type: boolean
    default: true
    description: Exit non-zero when no per-package coverage upload occurs.
  disable-search:
    type: boolean
    default: false
    description: Disable automatic coverage file search for each package upload.
  files:
    type: string
    default: ""
    description: Comma-separated list of explicit files to upload.
  flags:
    type: string
    default: ""
    description: Comma-separated list of additional Codecov flags for this upload.

steps:
  - run:
      name: Upload monorepo coverage per package using Codecov CLI
      working_directory: << parameters.monorepo-root >>
      command: << include(scripts/uploadMonorepoCoverageWithCodecovCli.sh) >>
      environment:
        MONOREPO_ROOT: << parameters.monorepo-root >>
        COVERAGE_DIR: << parameters.app-dir >>/<< parameters.coverage-dir >>
        CODECOV_FAIL_ON_ERROR: << parameters.fail-on-error >>
        CODECOV_VERBOSE: << parameters.verbose >>
        CODECOV_DISABLE_SEARCH: << parameters.disable-search >>
        CODECOV_REQUIRE_UPLOADS: << parameters.require-uploads >>
        CODECOV_FILES: << parameters.files >>
        CODECOV_FLAGS: << parameters.flags >>
