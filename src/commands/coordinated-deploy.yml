description: >
  Deploy repository state at the promotion tag commit (commit-primary semantics). Parses
  staging-<cycle-id>-rc<n> or prod-<cycle-id> from CIRCLE_TAG, validates
  .releases/<cycle-id>/rc<n>/manifest.yml, then runs pnpm run <deploy-script>. Exports
  PROMOTION_ENV, RELEASE_ID, RC_INDEX, RELEASE_MANIFEST_PATH, and ARTIFACTS_JSON for the deploy
  script. Production deploys use the highest rc*/manifest.yml on the tagged commit.

parameters:
  app-dir:
    type: string
    default: "."
    description: Repository root (tag pipeline checkout).
  deploy-script:
    type: string
    description: >
      Required package.json script (e.g. deploy:coordinated). Not deploy:ci — use the legacy deploy
      command for per-package artifact tag deploys.
  dry-run:
    type: boolean
    default: false
    description: When true, runs pnpm run <deploy-script> -- --dry-run.
  manifest-path:
    type: string
    default: ""
    description: >
      Override manifest file path. When empty, resolves .releases/<cycle-id>/rc<n>/manifest.yml from
      the promotion tag.
  skip-manifest-validation:
    type: boolean
    default: false
    description: Skip manifest schema validation (escape hatch; still parses promotion tag).
  pre-deploy-steps:
    type: steps
    default: []
    description: Steps after validation and before pnpm run deploy-script.

steps:
  - steps: << parameters.pre-deploy-steps >>
  - run:
      name: Stage release cycle scripts
      working_directory: << parameters.app-dir >>
      command: << include(scripts/stageReleaseCycleWriter.sh) >>
  - run:
      name: Coordinated deploy (promotion tag)
      working_directory: << parameters.app-dir >>
      command: << include(scripts/runCoordinatedDeploy.sh) >>
      environment:
        APP_DIR: .
        DEPLOY_SCRIPT: << parameters.deploy-script >>
        DRY_RUN: << parameters.dry-run >>
        MANIFEST_PATH: << parameters.manifest-path >>
        SKIP_MANIFEST_VALIDATION: << parameters.skip-manifest-validation >>
        VALIDATE_RELEASE_MANIFEST_SCRIPT: /tmp/chiubaka-release-cycle/validateReleaseManifest.mjs
