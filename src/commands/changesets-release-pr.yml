description: >
  If .changeset/ contains pending changesets, run changeset version, commit on
  release/<primary-branch>, push, and open or update one GitHub PR into the default branch via gh.
  If changeset version does not change any package.json (e.g. empty or verification-only changesets),
  exits successfully without opening a PR. Requires GITHUB_TOKEN (contents, pull requests; push to
  release/*) or mint one first with mint-github-token from a client-owned GitHub App. Install gh first (see job) or use an image that includes gh.

parameters:
  app-dir:
    type: string
    default: "."
    description: Path to the monorepo root (contains .changeset/ and package.json).
  primary-branch:
    type: string
    default: "master"
    description: Default branch name; release branch will be release/<this value>.
  create-release-manifest:
    type: boolean
    default: false
    description: >
      When true, after changeset version writes .releases/<cycle-id>/rc<n>/ with manifest and notes
      (application deployment repos only). Requires deployable-packages.
  deployable-packages:
    type: string
    default: ""
    description: >
      Comma-separated deployable key=relative/path pairs when create-release-manifest is true
      (e.g. server=packages/server,web=apps/web). Keys become artifact map entries and tag prefixes.
  manifest-train-tag-prefix:
    type: string
    default: "release/"
    description: >
      Remote tag prefix when allocating the cycle id (aligns with github-release-train).
  release-notes-grouping:
    type: enum
    enum:
      - bump-type
      - category
    default: category
    description: >
      category (default) groups release-PR notes under Breaking Changes / Security / Features /
      Improvements / Bug Fixes / Deprecations / Other Changes using summary prefix tokens.
      bump-type groups under Major / Minor / Patch (legacy escape hatch).

steps:
  - run:
      name: Stage Chiubaka release notes formatter
      working_directory: << parameters.app-dir >>
      command: << include(scripts/stageFormatChangesetsBatchReleaseNotes.sh) >>
  - when:
      condition: << parameters.create-release-manifest >>
      steps:
        - run:
            name: Stage release cycle writer
            working_directory: << parameters.app-dir >>
            command: << include(scripts/stageReleaseCycleWriter.sh) >>
  - run:
      name: Changesets release PR (version + push + gh)
      working_directory: << parameters.app-dir >>
      command: << include(scripts/runChangesetsReleasePr.sh) >>
      environment:
        FORMAT_CHANGESETS_BATCH_RELEASE_NOTES_SCRIPT: /tmp/chiubaka-formatChangesetsBatchReleaseNotes.mjs
        REWRITE_CHANGELOG_CATEGORIES_SCRIPT: /tmp/chiubaka-rewriteChangelogCategories.mjs
        CHANGESET_CATEGORY_PREFIXES_SCRIPT: /tmp/chiubaka-changesetCategoryPrefixes.mjs
        WRITE_RELEASE_CYCLE_SCRIPT: /tmp/chiubaka-release-cycle/writeReleaseCycle.mjs
        APP_DIR: .
        PRIMARY_BRANCH: << parameters.primary-branch >>
        CREATE_RELEASE_MANIFEST: << parameters.create-release-manifest >>
        DEPLOYABLE_PACKAGES: << parameters.deployable-packages >>
        MANIFEST_TRAIN_TAG_PREFIX: << parameters.manifest-train-tag-prefix >>
        RELEASE_NOTES_GROUPING: << parameters.release-notes-grouping >>
