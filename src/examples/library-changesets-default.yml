description: >
  Library monorepo default path: Changesets verify, release PR, and gated publish with org-standard
  category release notes and prefix enforcement. No .releases/ manifests or promotion tags.

usage:
  version: 2.1
  orbs:
    chiubaka: chiubaka/circleci-orb@0.18.0

  workflows:
    verify:
      jobs:
        - chiubaka/verify-changesets:
            require-changeset-category-prefix: true
            filters:
              branches:
                ignore: master

    release-pr:
      jobs:
        - chiubaka/changesets-release-pr:
            context: [github]
            release-notes-grouping: category
            filters:
              branches:
                only: master

    publish:
      jobs:
        - chiubaka/changesets-gated-publish:
            context: [github-packages-publish]
            create-github-release: true
            release-notes-grouping: category
            filters:
              branches:
                only: master
