description: >
  Dynamic setup workflow: compute pipeline parameter run-changesets-publish from git diff
  (CHANGELOG.md or package.json version field changes), then continue to a main config that gates
  chiubaka/changesets-gated-publish. Uses chiubaka/compute-changesets-publish-parameters (same logic
  as src/scripts/computeChangesetsPublishParameters.sh). Enable "Dynamic Config using setup workflows"
  in CircleCI project settings.

usage:
  version: 2.1
  setup: true
  orbs:
    chiubaka: chiubaka/circleci-orb@0.15.0
    continuation: circleci/continuation@2.0.1
    jq: circleci/jq@3.0.2

  jobs:
    setup-publish-parameters:
      docker:
        - image: cimg/base:stable
      resource_class: small
      steps:
        - checkout
        - jq/install
        - chiubaka/compute-changesets-publish-parameters:
            base-revision: master
        - continuation/continue:
            configuration_path: .circleci/continue_config.yml
            parameters: /tmp/pipeline-parameters.json

  workflows:
    setup:
      jobs:
        - setup-publish-parameters

  # Alternate: circleci/path-filtering mapping to the same pipeline parameter name
  # run-changesets-publish (coarser than diff-based version checks). See CircleCI path-filtering docs.

  # Example continuation file `.circleci/continue_config.yml` (snippet):
  #   version: 2.1
  #   parameters:
  #     run-changesets-publish:
  #       type: boolean
  #       default: false
  #   orbs:
  #     chiubaka: chiubaka/circleci-orb@0.15.0
  #   workflows:
  #     master-publish:
  #       when:
  #         and:
  #           - equal: [master, << pipeline.git.branch >>]
  #           - equal: [true, << pipeline.parameters.run-changesets-publish >>]
  #       jobs:
  #         - chiubaka/changesets-gated-publish:
  #             context: [github-packages-publish]
  #             primary-branch: master
