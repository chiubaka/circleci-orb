description: >
  Application monorepo with release cycles but manual promotion tags (no promotion-tag-prefix on
  gated publish). Push staging-<cycle-id>-rc<n> or prod-<cycle-id> via git/GitHub UI; use
  promote-prod-release when ready for production GitHub Releases.

usage:
  version: 2.1
  orbs:
    chiubaka: chiubaka/circleci-orb@0.18.0

  workflows:
    verify:
      jobs:
        - chiubaka/verify-changesets:
            require-changeset-category-prefix: true
            filters:
              branches:
                ignore: main

    release-pr:
      jobs:
        - chiubaka/changesets-release-pr:
            context: [github]
            create-release-manifest: true
            deployable-packages: server=packages/server,web=apps/web
            release-notes-grouping: category
            filters:
              branches:
                only: main

    publish:
      jobs:
        - chiubaka/changesets-gated-publish:
            context: [github-packages-publish]
            create-github-release: false
            release-notes-grouping: category
            filters:
              branches:
                only: main

    promote-prod:
      jobs:
        - promote-prod-approval:
            type: approval
            filters:
              branches:
                only: main
        - chiubaka/promote-prod-release:
            context: [github]
            primary-branch: main
            requires:
              - promote-prod-approval
            filters:
              branches:
                only: main

    deploy:
      jobs:
        - chiubaka/coordinated-deploy:
            context: [deploy]
            deploy-script: deploy:coordinated
            filters:
              tags:
                only: /^(staging|prod)-.*/
