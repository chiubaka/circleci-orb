description: >
  Application monorepo (staging-first): Changesets release PR with .releases/<cycle-id>/ tree,
  gated publish that pushes staging-<cycle-id>-rc<n>, promote-prod-release for production GitHub
  Releases, and tag-triggered coordinated-deploy workflows. Library repos should omit
  create-release-manifest and promotion-tag-prefix (see publish-library-release.yml).

usage:
  version: 2.1
  orbs:
    chiubaka: chiubaka/circleci-orb@0.18.0
    path-filtering: circleci/path-filtering@1.0.0

  workflows:
    verify:
      jobs:
        - chiubaka/verify-changesets:
            require-changeset-category-prefix: true
            filters:
              branches:
                ignore: master
        - chiubaka/verify-release-manifest:
            filters:
              branches:
                ignore: master

    release-pr:
      jobs:
        - chiubaka/changesets-release-pr:
            context: [github]
            create-release-manifest: true
            deployable-packages: server=packages/server,web=apps/web
            release-notes-grouping: category
            filters:
              branches:
                only: master

    publish:
      jobs:
        - chiubaka/changesets-gated-publish:
            context: [github-packages-publish]
            create-github-release: false
            promotion-tag-prefix: staging
            release-notes-grouping: category
            filters:
              branches:
                only: master

    promote-prod:
      jobs:
        - promote-prod-approval:
            type: approval
            filters:
              branches:
                only: master
        - chiubaka/promote-prod-release:
            context: [github]
            primary-branch: master
            requires:
              - promote-prod-approval
            filters:
              branches:
                only: master

    deploy-staging:
      jobs:
        - chiubaka/coordinated-deploy:
            context: [deploy-staging]
            deploy-script: deploy:coordinated
            filters:
              tags:
                only: /^staging-.*-rc[0-9]+$/

    deploy-prod:
      jobs:
        - chiubaka/coordinated-deploy:
            context: [deploy-prod]
            deploy-script: deploy:coordinated
            filters:
              tags:
                only: /^prod-.*/
